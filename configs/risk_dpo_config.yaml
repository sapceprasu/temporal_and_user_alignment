
#Experiment Configuration for Risk dpo 

experiment:
  name: "risk_dpo"
  description: "Risk DPO experiment with temporal and user alignment"
  tags: ["risk", "dpo", "temporal_alignment", "user_alignment"]
  output_dir: "runs"
  seed: 42

# Model Configuration 
model:
  model_name: "meta-llama/llama-2-7b-chat-hf"
  max_length: 512
  dtype: "bfloat16"


#lora config
lora: 
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"


#training configuration

training: 
  learning_rate: 2e-5
  train_batch_size: 2
  gradient_accumulation: 16
  num_steps: 1000
  log_every: 10
  save_every: 200

# dpo parameters
dpo:
  beta: 0.1


# risk_dpo_parameteres
risk_dpo: 
  rho: 0.9
  kappa: 0.1
  tau: 0.2
  lambda: 0.5
  gamma: 0.98


#dataset config

dataset:
  path: "data/cache/train.jsonl"
  num_personas: 3
  num_time_bins : 2

#logging configs

logging:
  metrics_file: "metrics.jsonl"
  loss_file: "loss_curves.csv"




